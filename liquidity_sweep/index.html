<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --navy:#0a0e1a; --card:#141b30; --card2:#1a2238; --line:#26304d;
    --blue:#2f7dff; --blue2:#1a4fcc; --blue-soft:#5e9bff; --cyan:#37d4d0;
    --txt:#e8edf7; --muted:#8b97b5;
  }
  html,body{height:100%;}
  body{
    font-family:'Poppins','Segoe UI',sans-serif;
    background:
      radial-gradient(1000px 600px at 85% -10%, rgba(47,125,255,0.18), transparent 60%),
      radial-gradient(800px 600px at -10% 110%, rgba(55,212,208,0.10), transparent 55%),
      linear-gradient(180deg,#0a0e1a 0%,#0b1020 100%);
    color:var(--txt);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:28px 18px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{ width:100%; max-width:920px; }

  /* top logo */
  .topbar{ text-align:center; margin-bottom:26px; }
  .topbar img{ height:42px; width:auto; opacity:.96; }

  .card{
    background:linear-gradient(160deg,var(--card) 0%,var(--card2) 100%);
    border:1px solid var(--line);
    border-radius:22px;
    padding:38px 34px;
    box-shadow:0 30px 80px -30px rgba(0,0,0,.7);
    display:flex; gap:34px; align-items:center;
  }

  /* preview */
  .preview{ flex:none; width:230px; }
  .preview .frame{
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    background:#0b1124;
    box-shadow:0 18px 50px -20px rgba(0,0,0,.8);
    transform:rotate(-2deg);
    transition:transform .35s ease;
  }
  .preview .frame:hover{ transform:rotate(0deg) scale(1.02); }
  .preview img{ width:100%; display:block; }

  /* content */
  .content{ flex:1; min-width:0; }
  .kicker{
    font-size:11px; letter-spacing:3px; text-transform:uppercase;
    color:var(--cyan); font-weight:600; margin-bottom:10px;
    display:flex; align-items:center; gap:9px;
  }
  .kicker::before{ content:""; width:20px;height:2px;background:var(--blue);border-radius:2px;display:inline-block;}
  h1{ font-size:30px; font-weight:700; line-height:1.12; margin-bottom:8px;}
  h1 .accent{ color:var(--blue-soft);}
  .desc{ font-size:13.5px; line-height:1.6; color:#c2cce4; margin-bottom:18px; max-width:430px;}

  ul.feat{ list-style:none; margin-bottom:26px;}
  ul.feat li{
    font-size:13px; color:#cdd6ec; padding:5px 0 5px 22px; position:relative;
  }
  ul.feat li::before{
    content:""; position:absolute; left:0; top:9px; width:7px;height:7px;
    background:var(--blue); border-radius:2px; transform:rotate(45deg);
  }

  .dl{
    display:inline-flex; align-items:center; gap:11px;
    background:linear-gradient(135deg,var(--blue),var(--blue2));
    color:#fff; text-decoration:none; font-weight:600; font-size:15px;
    padding:15px 30px; border-radius:13px; border:none; cursor:pointer;
    box-shadow:0 14px 34px -12px rgba(47,125,255,.8);
    transition:transform .18s ease, box-shadow .18s ease;
    font-family:inherit;
  }
  .dl:hover{ transform:translateY(-2px); box-shadow:0 20px 44px -12px rgba(47,125,255,.9);}
  .dl:active{ transform:translateY(0);}
  .dl svg{ width:19px;height:19px;}
  .meta{ font-size:11px; color:var(--muted); margin-top:12px; letter-spacing:.4px;}

  .footer{
    margin-top:26px; text-align:center;
    font-size:11.5px; color:var(--muted); letter-spacing:.6px;
  }
  .footer a{ color:var(--blue-soft); text-decoration:none; font-weight:600;}
  .footer a:hover{ text-decoration:underline;}

  @media (max-width:680px){
    .card{ flex-direction:column; text-align:center; padding:30px 22px; gap:26px;}
    .preview{ width:200px;}
    .preview .frame{ transform:rotate(0);}
    .kicker{ justify-content:center;}
    .desc{ margin-left:auto; margin-right:auto;}
    ul.feat{ display:inline-block; text-align:left;}
    h1{ font-size:25px;}
  }
</style>
</head>
