  .lbl .s{ font-size:11px; color:var(--muted); margin-top:2px; }
  .arr{ flex:none; color:var(--muted); }
  .arr svg{ width:18px; height:18px; }

  .footer a{ color:var(--blue-soft); text-decoration:none; font-weight:600; }
